
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
spec:
  replicas: 5
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
      - name: gitops-app
        image: 886371025800.dkr.ecr.ap-south-1.amazonaws.com/gitops-app:v1
        ports:
        - containerPort: 5000
